services:
  civ6-bot:
    build: .
    container_name: civ6-bot
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      PORT: "${PORT:-5000}"
      PUBLIC_URL: ${PUBLIC_URL}
      API_SECRET: ${API_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./templates:/app/templates
