services:
  civ6-bot:
    build: .
    container_name: civ6-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      PORT: "5000"
      PUBLIC_URL: https://civ6.cortada-server.ddns.net
    volumes:
      - ./data.json:/app/data.json
      - ./config.json:/app/config.json
      - ./turn_history.json:/app/turn_history.json
